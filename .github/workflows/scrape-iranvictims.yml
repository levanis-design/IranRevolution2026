name: Scrape IranVictims CSV

on:
  schedule:
    - cron: '0 4 */3 * *' # Run every 3 days at 04:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-iranvictims:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Create empty .env file
        run: touch .env

      - name: Run IranVictims CSV Scraper
        run: npx tsx --env-file=.env scripts/scrapers/iranvictims_csv.ts --resume
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit position file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .scrape-web-position.json
          git diff --staged --quiet || git commit -m "chore: update iranvictims scrape position [skip ci]"
          git pull --rebase --autostash || true
          git push || echo "Warning: push blocked by branch protection — scrape position not saved to repo."
